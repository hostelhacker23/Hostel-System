<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>University Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background-color: #d0ecff;
      font-family: 'Segoe UI', sans-serif;
    }

    .navbar {
      background-color: #174374;
    }

    .navbar-brand {
      font-weight: bold;
      color: #ffc107 !important;
    }

    .nav-link {
      color: #fff !important;
      font-weight: 500;
    }

    .university-img {
      width: 100%;
      max-height: 500px;
      object-fit:cover;
    }

    .login-card {
      background-color: #fba937;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .form-control {
      border-radius: 10px;
      padding: 10px 15px;
    }

    .btn-login {
      background-color: #174374;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn-login:hover {
      background-color: #0f2b4a;
    }

    footer {
      background-color: #174374;
      color: white;
      padding: 20px 0;
    }

    .footer-links a {
      color: #ffc107;
      font-weight: bold;
      margin: 0 10px;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-4 sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img class="Logo" src="../images/logo.jpg" alt=""> Hostel System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="./Student_Dashboard.html">Student Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="./about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="./login_page.html">Login</a></li>
          <!-- Sign In Modal HTML -->
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#signInModal">Sign in</button>

        </ul>
      </div>
    </div>
  </nav>

  <!-- University Image -->
  <div class="w-100">
    <img src="../images/hostel-illustration.jpg" alt="University" class="university-img">
  </div>

  <!-- Login Form -->
  <div class="container my-5 d-flex justify-content-center">
    <div class="login-card w-100" style="max-width: 400px;">
      <h2 class="text-center text-dark mb-4">Login</h2>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">👤 Username</label>
          <input type="text" class="form-control" id="username" placeholder="Enter your username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">🔒 Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember Me</label>
          </div>
          <a href="#" class="text-dark small">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-login w-100 mb-3">Login</button>
        <p class="text-center">Don’t have an account? <a href="../pages/register.html" class="text-dark fw-bold">Register</a></p>
      </form>
    </div>
  </div>

  <!-- Footer -->
   <footer class="text-center">
    <div class="container">
      <p class="mb-2">© 2025 Smart Hostel. All rights reserved.</p>
<div class="footer-links d-flex justify-content-center gap-3">
      <a href="./login_page.html" class="btn btn-outline-primary btn-sm">Login</a>
      <a href="./register.html" class="btn btn-success btn-sm">Register Now</a>
    </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
