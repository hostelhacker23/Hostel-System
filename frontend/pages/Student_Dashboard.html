<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary p-3">
    <div class="container-fluid">
      <span class="navbar-brand">Welcome, <span id="studentName"></span></span>
      <button class="btn btn-warning btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center">📚 Student Dashboard</h2>
    <p class="text-center">Here is your personalized hostel information.</p>
  </div>

  <footer class="text-center bg-dark text-light py-3">
    © 2025 Smart Hostel | Dashboard
  </footer>

  <script>
    // Check login
    if (!localStorage.getItem("studentLoggedIn")) {
      window.location.href = "login_page.html"; // redirect if not logged in
      console.log("Redirecting to student login page...");

    } else {
      document.getElementById("studentName").textContent = localStorage.getItem("studentUser");
    }

    function logout() {
      localStorage.clear();
      window.location.href = "Student_Dashboard.html";
    }
  </script>
</body>
</html>
